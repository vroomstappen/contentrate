
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ContentRate Leaderboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.glass { background: rgba(30,41,59,0.55); backdrop-filter: blur(10px); }
.score-purple{background:#8b5cf6;}
.score-lightblue{background:#0ea5e9;}
.score-green{background:#10b981;}
.score-yellow{background:#facc15;color:#1f2937;}
.score-orange{background:#f97316;}
.score-red{background:#ef4444;}
</style>
</head>
<body class="bg-gray-900 text-gray-100 p-6">

<h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 to-red-600 text-center mb-6">
ContentRate Leaderboard
</h1>

<div class="max-w-3xl mx-auto glass p-6 rounded-xl shadow-xl">
    <input id="search" placeholder="Search..." class="w-full p-2 rounded bg-gray-800 mb-4" />
    <div id="main"></div>
</div>

<script>
let LOCAL_KEY = "contentrate_local";
let farmers = [];
let isAdmin = false;
let view = "leaderboard";
let selected = null;

async function init(){
    let local = localStorage.getItem(LOCAL_KEY);
    if(local){ farmers = JSON.parse(local); }
    else{
        let res = await fetch("data.json");
        farmers = await res.json();
        localStorage.setItem(LOCAL_KEY, JSON.stringify(farmers));
    }
    document.getElementById("search").addEventListener("input", e=>{
        if(e.target.value==="/admin"){ isAdmin=true; alert("Admin unlocked"); e.target.value=""; }
        render();
    });
    render();
}

function save(){ localStorage.setItem(LOCAL_KEY, JSON.stringify(farmers)); }

function avg(f){
    if(!f.scores.length) return 0;
    let last = f.scores.slice(0,5).map(s=>s.score);
    return last.reduce((a,b)=>a+b,0)/last.length;
}

function color(score){
    if(score>=9) return "score-purple";
    if(score>=8) return "score-lightblue";
    if(score>=7) return "score-green";
    if(score>=6.5) return "score-yellow";
    if(score>=6) return "score-orange";
    return "score-red";
}

function showProfile(id){
    selected = farmers.find(f=>f.id===id);
    view="profile";
    render();
}

function exportJSON(){
    let data = JSON.stringify(farmers,null,2);
    let a = document.createElement("a");
    a.href = "data:text/json;charset=utf-8,"+encodeURIComponent(data);
    a.download="data.json";
    a.click();
}

function render(){
    let main = document.getElementById("main");
    if(view==="profile"){ renderProfile(main); return; }
    renderLeaderboard(main);
}

function renderLeaderboard(main){
    let s = document.getElementById("search").value.toLowerCase();
    let list = farmers.slice().sort((a,b)=>avg(b)-avg(a));
    list = list.filter(f=>f.name.toLowerCase().includes(s));
    main.innerHTML = list.map((f,i)=>{
        let a = avg(f).toFixed(2);
        return `
        <div onclick="showProfile('${f.id}')" class="p-3 my-2 rounded bg-gray-800 hover:bg-gray-700 cursor-pointer flex justify-between">
            <div>
                <div class="font-bold">#${i+1} ${f.name}</div>
                <div class="text-gray-400 text-sm">Avg: ${a}</div>
            </div>
            <div class="px-3 py-1 rounded-full font-bold text-gray-900 ${color(a)}">${a}</div>
        </div>`;
    }).join("")
    + (isAdmin? `<button onclick="exportJSON()" class="mt-4 bg-green-600 p-2 rounded">Export JSON</button>`:"");
}

function renderProfile(main){
    let f = selected;
    let a = avg(f).toFixed(2);
    let bars = f.scores.slice(0,5).map(s=>`
        <div class="flex items-end gap-2">
            <div class="${color(s.score)} w-6" style="height:${s.score*10}px"></div>
            <div class="text-xs">${s.date}</div>
        </div>
    `).join("");

    main.innerHTML = `
    <button onclick="view='leaderboard';render();" class="text-yellow-400 mb-4">&larr; Back</button>
    <h2 class="text-3xl font-bold mb-4">${f.name}</h2>
    <div class="mb-4">
        <span class="px-3 py-1 rounded-full text-gray-900 ${color(a)}">${a}</span>
        <span class="ml-2 text-gray-400">5‑day average</span>
    </div>
    <div class="glass p-4 rounded mb-4">
        <h3 class="font-bold mb-2">Recent Scores</h3>
        <div class="flex gap-4">${bars}</div>
    </div>
    ${isAdmin? `<button onclick="exportJSON()" class="bg-green-600 p-2 rounded">Export JSON</button>`:""}
    `;
}

init();
</script>

</body>
</html>
